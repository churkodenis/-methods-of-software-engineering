<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Траєкторія руху точки (Canvas)</title>
    <style>
     
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        canvas { border: 1px solid #ccc; background: white; cursor: crosshair; }
        .controls { display: flex; flex-direction: column; gap: 10px; min-width: 250px; }
        label { font-size: 14px; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .buttons { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-draw { background: #4CAF50; }
        .btn-draw:hover { background: #45a049; }
        .btn-clear { background: #f44336; }
        .btn-clear:hover { background: #da190b; }
    </style>
</head>
<body>

    <h2>Побудова траєкторії руху матеріальної точки</h2>

    <div class="container">
        <canvas id="plotCanvas" width="600" height="400"></canvas>

        <div class="controls">
            <label for="x0">x₀ (Початкова X):</label>
            <input type="number" id="x0" value="0">
            
            <label for="y0">y₀ (Початкова Y):</label>
            <input type="number" id="y0" value="0">
            
            <label for="angle">Кут (градуси):</label>
            <input type="number" id="angle" value="45">
            
            <label for="v0">Початкова швидкість (v₀):</label>
            <input type="number" id="v0" value="50">
            
            <label for="accel">Прискорення (a):</label>
            <input type="number" id="accel" value="9.8">
            
            <label for="color">Колір траєкторії:</label>
            <input type="color" id="color" value="#ff00ff">

            <div class="buttons">
                <button class="btn-draw" onclick="drawTrajectory()">Графік</button>
                <button class="btn-clear" onclick="clearCanvas()">Очистити</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
