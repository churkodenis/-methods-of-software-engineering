<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Симулятор руху D3.js</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .main-container { display: flex; gap: 20px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 30px; }
        #chart { background: #fff; border: 1px solid #eee; }
        .controls { display: flex; flex-direction: column; gap: 8px; width: 220px; }
        label { font-size: 12px; color: #555; font-weight: bold; }
        input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .btns { margin-top: 10px; display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; }
        .draw-btn { background: #007bff; color: white; }
        .draw-btn:hover { background: #0056b3; }
        .clear-btn { background: #6c757d; color: white; }
        .axis path, .axis line { stroke: #999; }
        .grid line { stroke: #e0e0e0; stroke-dasharray: 2,2; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="chart"></div>

    <div class="controls">
        <label>x₀ (Початкова X):</label> <input type="number" id="x0" value="0">
        <label>y₀ (Початкова Y):</label> <input type="number" id="y0" value="0">
        <label>Кут (градуси):</label> <input type="number" id="angle" value="30">
        <label>Швидкість (v₀):</label> <input type="number" id="v0" value="50">
        <label>Прискорення (acceleration):</label> <input type="number" id="accel" value="5">
        <label>Колір:</label> <input type="color" id="color" value="#6200ee">
        
        <div class="btns">
            <button class="draw-btn" onclick="addTrajectory()">Побудувати</button>
            <button class="clear-btn" onclick="resetChart()">Очистити</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
